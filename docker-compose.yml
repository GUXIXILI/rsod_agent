services:
  postgres:
    image: postgres:15-alpine
    container_name: glw-rsod-agent-postgres
    environment:
      POSTGRES_USER: rsod_admin
      POSTGRES_PASSWORD: rsod_admin
      POSTGRES_DB: rsod_agent
    ports:
      - "5433:5432"
    volumes:
      - glw-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rsod_admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - glw-rsod-network

  redis:
    image: redis:7-alpine
    container_name: glw-rsod-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - glw-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - glw-rsod-network

  minio:
    image: minio/minio:latest
    container_name: glw-rsod-agent-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - glw-minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - glw-rsod-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: glw-rsod-agent-backend
    environment:
      DATABASE_URL: postgresql://rsod_admin:rsod_admin@postgres:5432/rsod_agent
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: fire-detection-images
      JWT_SECRET_KEY: change_this_secret_key_in_production_min_32_chars
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      LLM_STUB_MODE: "true"
      DEBUG: "false"
      APP_NAME: "Fire & Smoke Detection Platform"
      ALLOWED_ORIGINS: "http://localhost:80,http://localhost:5173,http://localhost:3000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
    # ⚠️ 注意：command 必须与 build、environment、ports 同级，不能放在 volumes 下面
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - glw-rsod-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: glw-rsod-agent-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - glw-rsod-network

networks:
  glw-rsod-network:
    external: true

volumes:
  glw-postgres-data:
    external: true
  glw-redis-data:
    external: true
  glw-minio-data:
    external: true