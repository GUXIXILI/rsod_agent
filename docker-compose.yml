services:
  # ── PostgreSQL + Pgvector ──────────────────────────
  postgres:
    image: pgvector/pgvector:pg15
    container_name: glw-rsod-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rsod_agent
      POSTGRES_USER: rsod_admin
      POSTGRES_PASSWORD: rsod_admin
    ports:
      - "5433:5432"
    volumes:
      - glw-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rsod_admin -d rsod_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: glw-rsod-agent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - glw-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MinIO 对象存储 ─────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: glw-rsod-agent-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_REQUEST_HEADER_SIZE_LIMIT: "32768"
    ports:
      - "9000:9000" # API 端口
      - "9001:9001" # Console 端口
    volumes:
      - glw-minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Backend API ────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: glw-rsod-agent-backend
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: rsod_agent
      DB_USER: rsod_admin
      DB_PASSWORD: rsod_admin
      DATABASE_URL: postgresql://rsod_admin:rsod_admin@postgres:5432/rsod_agent
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: fire-detection-images
      MINIO_SECURE: "false"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production-please-at-least-32-chars}
      DEBUG: "false"
      LOG_LEVEL: INFO
      LLM_STUB_MODE: "false"
      QWEN_API_KEY: acu_uVab4ofw12M0YvXXfA0DmCQ84mUSKCUt
      QWEN_BASE_URL: https://api.ltzy.top/v1
      QWEN_MODEL: meta/llama-3.1-70b-instruct
      USE_LOCAL_LLM: "false"
      EMBEDDING_API_KEY: acu_uVab4ofw12M0YvXXfA0DmCQ84mUSKCUt
      EMBEDDING_BASE_URL: https://api.ltzy.top/v1
      EMBEDDING_MODEL: text-embedding-3-small
      SCHEDULER_ENABLED: "true"
      ALLOWED_ORIGINS: "http://localhost:80,http://localhost:3000,http://localhost:5173"
      FIRE_SMOKE_DEVICE: "cpu"
    ports:
      - "8000:8000"
    volumes:
      - ./backend/runs:/app/backend/runs
      - ./backend/logs:/app/backend/logs
    # WORKDIR 为 /app/backend，alem bic 和 uvicorn 均在 backend 目录下运行
    command: >
      sh -c "alembic upgrade head &&
      uvicorn main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ── Frontend Nginx ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: glw-rsod-agent-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  # ── Ollama 本地 LLM（可选）─────────────────────────
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: glw-rsod-agent-ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - glw-ollama-data:/root/.ollama
  # GPU 加速（取消注释以启用 NVIDIA GPU 支持）
  # deploy:
  #   resources:
  #     reservations:
  #       devices:
  #         - driver: nvidia
  #           count: all
  #           capabilities: [gpu]

networks:
  default:
    name: glw-rsod-network

volumes:
  glw-postgres-data:
  glw-redis-data:
  glw-minio-data:
  glw-ollama-data:
